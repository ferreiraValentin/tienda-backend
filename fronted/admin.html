<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>⚙️ Panel Administrador
    <button id="botonLogout" style="float:right; font-size:0.5em;">Cerrar sesión</button>
  </h1>

  <section class="admin">
    <h2 id="formTitulo">Crear producto</h2>

    <form id="productoForm">
      <input type="hidden" name="id" id="productoId">

      <input type="text" name="nombre" id="nombre" placeholder="Nombre del producto" required>

      <input type="number" name="precio" id="precio" placeholder="Precio" required>

      <input type="number" name="stock" id="stock" placeholder="Stock" min="0" required>

      <select name="categoria" id="categoria" required>
        <option value="">Seleccionar categoría</option>
        <option value="Audio">Audio</option>
        <option value="Cargadores">Cargadores</option>
        <option value="Cables">Cables</option>
        <option value="Accesorios">Accesorios</option>
        <option value="Ofertas">Ofertas</option>
        <option value="Hogar">Hogar</option>
      </select>

      <label>
        <input type="checkbox" name="destacado" id="destacado">
        ⭐ Producto destacado
      </label>

      <div id="imagenActual" style="display:none; margin: 10px 0;">
        <p style="margin-bottom:5px;">Imagen actual:</p>
        <img id="previewImagen" src="" width="100" style="border-radius:8px;">
        <p style="font-size:0.85em; color:#888;">Si no seleccionás una imagen nueva, se mantiene la actual.</p>
      </div>

      <input type="file" name="imagen" id="imagenInput">

      <button type="submit" id="botonSubmit">Crear producto</button>
      <button type="button" id="botonCancelar" style="display:none;">Cancelar edición</button>
    </form>

    <hr>

    <h2>Productos cargados</h2>
    <div id="listaProductos"></div>

  </section>

  <script src="admin.js"></script>

</body>
</html>
