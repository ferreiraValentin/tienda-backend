<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Tienda Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="admin-topbar">
    <h1>⚙️ Panel Administrador</h1>
    <nav class="admin-nav">
      <a href="admin.html" class="activa">Productos</a>
      <a href="pedidos.html">Pedidos</a>
    </nav>
    <button id="botonLogout">Cerrar sesión</button>
  </div>

  <section class="admin">
    <h2 id="formTitulo">Crear producto</h2>

    <form id="productoForm">
      <input type="hidden" name="id" id="productoId">

      <input type="text" name="nombre" id="nombre" placeholder="Nombre del producto" required>

      <input type="number" name="precio" id="precio" placeholder="Precio" required>

      <input type="number" name="stock" id="stock" placeholder="Stock" min="0" required>

      <select name="categoria" id="categoria" required>
        <option value="">Seleccionar categoría</option>
        <option value="Audio">Audio</option>
        <option value="Cargadores">Cargadores</option>
        <option value="Cables">Cables</option>
        <option value="Accesorios">Accesorios</option>
        <option value="Ofertas">Ofertas</option>
        <option value="Hogar">Hogar</option>
      </select>

      <label class="check-destacado">
        <input type="checkbox" name="destacado" id="destacado">
        ⭐ Producto destacado
      </label>

      <div id="imagenActual" class="imagen-actual-preview">
        <p>Imagen actual:</p>
        <img id="previewImagen" src="" width="90">
        <p class="nota-imagen">Si no seleccionás una imagen nueva, se mantiene la actual.</p>
      </div>

      <input type="file" name="imagen" id="imagenInput">

      <button type="submit" id="botonSubmit">Crear producto</button>
      <button type="button" id="botonCancelar" class="boton-cancelar">Cancelar edición</button>
    </form>
  </section>

  <section class="admin lista-admin">
    <h2>Productos cargados</h2>
    <div id="listaProductos"></div>
  </section>

  <script src="admin.js"></script>

</body>
</html>
